name: Build

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install --silent
      - name: TypeScript
        id: typecheck
        continue-on-error: true
        run: npm run typecheck --silent > typecheck.log 2>&1
      - name: Upload TypeScript diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-diagnostics
          path: typecheck.log
          retention-days: 1
      - name: Fail on TypeScript errors
        if: steps.typecheck.outcome == 'failure'
        run: |
          cat typecheck.log
          exit 1
      - name: Production build
        if: steps.typecheck.outcome == 'success'
        run: npm run build --silent
